<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />

        <title>ClimbPass</title>
        <meta
            name="description"
            content="Учёт абонементов на скалодром: остаток посещений и срок действия всегда под рукой."
        />
        <link rel="manifest" href="manifest.json" />

        <meta name="theme-color" content="#ff6b2c" />

        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="ClimbPass" />

        <link rel="apple-touch-icon" href="icon-192.png" />
        <style>
            * {
                user-select: none; /* стандарт */
                -webkit-user-select: none; /* Safari / iOS */
                -moz-user-select: none; /* Firefox */
                -ms-user-select: none; /* IE/Edge */
            }

            :root {
                --bg: #f2f2f7;
                --card: #ffffff;
                --accent: #ff6b2c;
                --accent2: #ff9a6c;
                --text: #1c1c1e;
                --muted: #8e8e93;
                --border: #e5e5ea;
            }

            body {
                margin: 0;
                background: var(--bg);
                font-family:
                    -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
                color: var(--text);
                -webkit-touch-callout: none; /* убирает контекстное меню при долгом тапе на iOS */
            }

            .container {
                max-width: 520px;
                margin: auto;
                padding: 20px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 20px;
            }

            .card {
                background: white;
                border-radius: 22px;
                padding: 22px;
                margin-bottom: 18px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            }

            .small {
                font-size: 14px;
                color: var(--muted);
            }

            input,
            select {
                width: 100%;
                max-width: 100%;
                box-sizing: border-box;
                padding: 12px;
                border-radius: 12px;
                border: 1px solid var(--border);
                background: #f9f9f9;
                margin-bottom: 12px;
                font-size: 16px;
                display: block;
                text-align: left;
                text-align-last: left;
            }

            input[type='date'],
            input[type='number'],
            select {
                width: 100%;
                max-width: 100%;
                box-sizing: border-box;
                -webkit-appearance: none;
                appearance: none;
            }

            button {
                border: none;
                border-radius: 14px;
                padding: 14px;
                font-size: 16px;
                cursor: pointer;
            }

            .primary {
                background: var(--accent);
                color: white;
                width: 100%;
            }

            .secondary {
                background: #f2f2f7;
            }

            .visit {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 12px 0;
                border-bottom: 1px solid var(--border);
            }

            .delete {
                background: none;
                padding: 0;
            }

            .delete svg {
                width: 18px;
                height: 18px;
                fill: black;
            }

            .edit-buttons {
                display: flex;
                gap: 12px;
                margin-top: 14px;
            }

            .edit-buttons button {
                flex: 1;
            }

            .pass-card {
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                color: white;

                border-radius: 24px;

                padding: 24px;

                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);

                margin-bottom: 20px;

                transition: background 0.4s;
            }

            .pass-card.warn {
                background: linear-gradient(135deg, #e53e3e, #fc8181);
            }

            .pass-top {
                display: flex;
                justify-content: space-between;
            }

            .pass-title {
                font-size: 18px;
                font-weight: 600;
            }

            .pass-dates {
                font-size: 14px;
                opacity: 0.9;
            }

            .pass-visits {
                font-size: 48px;
                font-weight: 700;
                margin-top: 14px;
            }

            .pass-label {
                font-size: 14px;
                opacity: 0.9;
            }

            .progress-bar {
                margin-top: 16px;
                height: 10px;
                background: rgba(255, 255, 255, 0.25);
                border-radius: 8px;
                overflow: hidden;
            }

            .progress-fill {
                height: 100%;
                background: white;
                border-radius: 8px;
                transition: width 0.4s;
            }

            .pass-actions {
                margin-top: 18px;
            }

            .pass-edit {
                background: none;
                border: none;
                color: white;
            }

            .footer-help {
                text-align: center;
                margin-top: 30px;
                margin-bottom: 40px;
                font-size: 14px;
                color: var(--muted);
            }

            .footer-help a {
                color: var(--accent);
                text-decoration: none;
                font-weight: 500;
            }

            .footer-actions {
                display: flex;
                gap: 10px;
                margin-top: 14px;
            }

            .footer-actions button {
                flex: 1;
                padding: 11px;
                font-size: 14px;
                border-radius: 12px;
                background: white;
                color: var(--text);
                border: 1px solid var(--border);
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            }

            .footer-actions button:active {
                background: var(--bg);
            }

            .import-area {
                margin-top: 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .import-area textarea {
                width: 100%;
                box-sizing: border-box;
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 12px;
                font-size: 13px;
                font-family: monospace;
                background: #f9f9f9;
                resize: vertical;
                min-height: 80px;
                color: var(--text);
                user-select: text;
                -webkit-user-select: text;
            }

            .import-area .row {
                display: flex;
                gap: 8px;
            }

            .import-area .row button {
                flex: 1;
            }

            .toast {
                position: fixed;
                bottom: 28px;
                left: 50%;
                transform: translateX(-50%);
                background: #1c1c1e;
                color: white;
                padding: 10px 20px;
                border-radius: 20px;
                font-size: 14px;
                white-space: nowrap;
                z-index: 9999;
                animation:
                    toastIn 0.2s ease,
                    toastOut 0.3s ease 1.7s forwards;
                pointer-events: none;
            }

            @keyframes toastIn {
                from {
                    opacity: 0;
                    transform: translateX(-50%) translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
            }

            @keyframes toastOut {
                to {
                    opacity: 0;
                    transform: translateX(-50%) translateY(10px);
                }
            }

            .help-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                box-sizing: border-box;
                z-index: 1000;
            }

            .help-modal {
                background: white;
                border-radius: 18px;
                padding: 22px;
                max-width: 420px;
                width: 90%;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            }

            .help-modal h3 {
                margin-top: 0;
            }

            .help-close {
                margin-top: 16px;
                width: 100%;
            }

            .help-icon {
                display: inline-block;
                width: 18px;
                height: 18px;
                vertical-align: -3px;
                margin: 0 4px;
            }

            .help-icon svg {
                width: 100%;
                height: 100%;
                fill: currentColor;
            }

            /* кнопка «Отметить посещение» */
            .btn-visit {
                transition:
                    transform 0.1s,
                    box-shadow 0.1s;
            }

            .btn-visit:active {
                transform: scale(0.96);
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
            }

            @keyframes visitAdded {
                0% {
                    transform: scale(1);
                }
                40% {
                    transform: scale(1.06);
                }
                100% {
                    transform: scale(1);
                }
            }

            .btn-visit.pop {
                animation: visitAdded 0.3s ease;
            }

            /* раскрываемый архив */
            .archive-row {
                cursor: pointer;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 12px 0;
                border-bottom: 1px solid var(--border);
            }

            .archive-row:last-child {
                border-bottom: none;
            }

            .archive-row .chevron {
                font-size: 11px;
                color: var(--muted);
                transition: transform 0.2s;
                display: inline-block;
            }

            .archive-row.open .chevron {
                transform: rotate(180deg);
            }

            .archive-detail {
                padding: 6px 0 10px 0;
                border-bottom: 1px solid var(--border);
            }

            .archive-detail:last-child {
                border-bottom: none;
            }

            .archive-visit-item {
                font-size: 13px;
                color: var(--muted);
                padding: 3px 0;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div id="app"></div>
        </div>

        <script>
            let APP_VERSION = '';
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistration().then((reg) => {
                    const sw = reg?.active || reg?.installing || reg?.waiting;
                    if (sw?.scriptURL) {
                        fetch(sw.scriptURL)
                            .then((r) => r.text())
                            .then((text) => {
                                const m = text.match(
                                    /CACHE_VERSION\s*=\s*['"]climbpass-v([\d.]+)['"]/,
                                );
                                if (m) {
                                    APP_VERSION = m[1];
                                    const el =
                                        document.getElementById('appVersion');
                                    if (el) el.textContent = 'v' + APP_VERSION;
                                }
                            });
                    }
                });
            }

            let data = JSON.parse(localStorage.getItem('climb_pass') || '[]');
            let expandedArchiveId = null;

            function save() {
                localStorage.setItem('climb_pass', JSON.stringify(data));
            }

            function today() {
                return new Date().toISOString().split('T')[0];
            }

            function plus30() {
                let d = new Date();
                d.setDate(d.getDate() + 30);
                return d.toISOString().split('T')[0];
            }

            function formatDate(d) {
                return new Date(d).toLocaleDateString('ru-RU');
            }

            function daysLeft(end) {
                let diff = (new Date(end) - new Date()) / (1000 * 60 * 60 * 24);
                return Math.max(0, Math.ceil(diff));
            }

            function activePass() {
                return data.find((p) => p.status === 'active');
            }

            function archiveCheck() {
                let p = activePass();

                if (!p) return;

                if (
                    new Date(p.end) < new Date() ||
                    p.visits.length >= p.total
                ) {
                    p.status = 'archived';
                    save();
                }
            }

            function createPass() {
                data.push({
                    id: Date.now(),
                    start: startInput.value,
                    end: endInput.value,
                    total: parseInt(totalInput.value),
                    visits: [],
                    status: 'active',
                });

                save();
                render();
            }

            function addVisit() {
                let p = activePass();
                if (!p) return;
                if (p.visits.length >= p.total) return;

                let todayStr = today();
                if (p.visits.includes(todayStr)) {
                    if (
                        !confirm(
                            'Вы уже отметили посещение сегодня. Добавить ещё одно?',
                        )
                    )
                        return;
                }

                p.visits.push(todayStr);
                save();

                // анимация кнопки
                render();
                requestAnimationFrame(() => {
                    let btn = document.querySelector('.btn-visit');
                    if (btn) {
                        btn.classList.remove('pop');
                        void btn.offsetWidth;
                        btn.classList.add('pop');
                    }
                });
            }

            function deleteVisit(i) {
                if (!confirm('Удалить это посещение?')) return;

                let p = activePass();
                p.visits.splice(i, 1);
                save();
                render();
            }

            function renderCreate() {
                return `
<div class="card">

<h3>Новый абонемент</h3>

<div class="small">Дата начала</div>
<input id="startInput" type="date" value="${today()}">

<div class="small">Дата окончания</div>
<input id="endInput" type="date" value="${plus30()}">

<div class="small">Количество посещений</div>
<select id="totalInput">
<option value="1">1</option>
<option value="4">4</option>
<option value="8" selected>8</option>
</select>

<button class="primary" onclick="createPass()">Давай-давай-давай!</button>

</div>
`;
            }

            function renderPassCard(p) {
                let remain = p.total - p.visits.length;

                let percent = (remain / p.total) * 100;

                let days = daysLeft(p.end);
                let isUrgent = remain <= 1 || days <= 3;
                let warnClass = isUrgent ? ' warn' : '';

                let warnMsg = '';
                if (remain === 0) {
                    warnMsg =
                        '<div style="margin-top:10px;font-size:13px;opacity:0.95;font-weight:600;">⚠️ Посещения закончились</div>';
                } else if (remain === 1) {
                    warnMsg =
                        '<div style="margin-top:10px;font-size:13px;opacity:0.95;font-weight:600;">⚠️ Осталось последнее посещение</div>';
                } else if (days === 0) {
                    warnMsg =
                        '<div style="margin-top:10px;font-size:13px;opacity:0.95;font-weight:600;">⚠️ Абонемент истекает сегодня</div>';
                } else if (days <= 3) {
                    warnMsg = `<div style="margin-top:10px;font-size:13px;opacity:0.95;font-weight:600;">⚠️ Абонемент истекает через ${days} дн.</div>`;
                }

                // сортируем по убыванию даты для отображения
                let sortedVisits = [...p.visits]
                    .map((v, origIndex) => ({ date: v, origIndex }))
                    .sort((a, b) => (a.date < b.date ? 1 : -1));

                let visitsHTML = sortedVisits
                    .map(
                        ({ date, origIndex }) => `
<div class="visit">
  <div>${formatDate(date)}</div>
  <button class="delete" onclick="deleteVisit(${origIndex})">
    <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm2 3h14l-1.5 12.5H6.5L5 9z"/></svg>
  </button>
</div>`,
                    )
                    .join('');

                return `

<div class="pass-card${warnClass}">

<div class="pass-top">

<div>

<div class="pass-title">Абонемент</div>

<div class="pass-dates">${formatDate(p.start)} — ${formatDate(p.end)}</div>

<div class="pass-dates">${days} дней осталось</div>

</div>

<button class="pass-edit" onclick="editPass()">

<svg viewBox="0 0 24 24" width="18" height="18">

<path fill="currentColor" d="M3 17.25V21h3.75l11-11.03-3.75-3.75L3 17.25z"/>

</svg>

</button>

</div>

<div class="pass-visits">${remain}</div>

<div class="pass-label">осталось посещений</div>

<div class="progress-bar">

<div class="progress-fill" style="width:${percent}%"></div>

</div>

${warnMsg}

<div class="pass-actions">

<button class="primary btn-visit" onclick="addVisit()">Отметить посещение</button>

</div>

</div>

<div class="card">

<h3>История посещений</h3>

${visitsHTML || '<div class="small">Нет посещений</div>'}

</div>

`;
            }

            function toggleArchive(id) {
                expandedArchiveId = expandedArchiveId === id ? null : id;
                render();
            }

            function renderArchive() {
                let archive = data
                    .filter((x) => x.status === 'archived')
                    .sort((a, b) => (a.end < b.end ? 1 : -1));
                if (!archive.length) {
                    return `<div class="card"><h3>Архив абонементов</h3><div class="small">Архив пуст</div></div>`;
                }

                // #8: сортируем визиты по убыванию внутри каждого архивного абонемента
                let html = archive
                    .map((a) => {
                        let isOpen = expandedArchiveId === a.id;
                        let openClass = isOpen ? ' open' : '';

                        let detailHTML = '';
                        if (isOpen) {
                            let sorted = [...a.visits].sort((x, y) =>
                                x < y ? 1 : -1,
                            );
                            if (sorted.length) {
                                detailHTML = `<div class="archive-detail">${sorted
                                    .map(
                                        (v) =>
                                            `<div class="archive-visit-item">📅 ${formatDate(v)}</div>`,
                                    )
                                    .join('')}</div>`;
                            } else {
                                detailHTML = `<div class="archive-detail"><div class="archive-visit-item">Посещений не было</div></div>`;
                            }
                        }

                        return `
<div class="archive-row${openClass}" onclick="toggleArchive(${a.id})">
  <div>
    <div style="font-size:14px;">${formatDate(a.start)} — ${formatDate(a.end)}</div>
    <div class="small">${a.visits.length} из ${a.total} посещений</div>
  </div>
  <span class="chevron">▼</span>
</div>
${detailHTML}`;
                    })
                    .join('');

                return `<div class="card"><h3>Архив абонементов</h3>${html}</div>`;
            }

            function showToast(msg) {
                document
                    .querySelectorAll('.toast')
                    .forEach((el) => el.remove());
                let t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 2100);
            }

            function exportData() {
                let json = JSON.stringify(data, null, 2);
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard
                        .writeText(json)
                        .then(() => {
                            showToast('✅ Скопировано в буфер обмена');
                        })
                        .catch(() => showExportFallback(json));
                } else {
                    showExportFallback(json);
                }
            }

            function showExportFallback(json) {
                // на iOS clipboard API часто недоступен — показываем textarea для ручного копирования
                let existing = document.getElementById('exportFallback');
                if (existing) {
                    existing.remove();
                    return;
                }
                let wrap = document.createElement('div');
                wrap.id = 'exportFallback';
                wrap.className = 'import-area';
                wrap.style.marginTop = '12px';
                wrap.innerHTML = `
                    <div class="small" style="margin-bottom:4px;">Выделите всё и скопируйте:</div>
                    <textarea readonly onclick="this.select()">${json}</textarea>`;
                document.getElementById('exportImportCard').appendChild(wrap);
                wrap.querySelector('textarea').select();
            }

            let importVisible = false;

            function toggleImport() {
                importVisible = !importVisible;
                render();
                if (importVisible) {
                    requestAnimationFrame(() => {
                        let ta = document.getElementById('importTextarea');
                        if (ta) ta.focus();
                    });
                }
            }

            function doImport() {
                let ta = document.getElementById('importTextarea');
                if (!ta) return;
                let raw = ta.value.trim();
                try {
                    let parsed = JSON.parse(raw);
                    if (!Array.isArray(parsed)) throw new Error();
                    // базовая валидация структуры
                    for (let p of parsed) {
                        if (
                            !p.id ||
                            !p.start ||
                            !p.end ||
                            !Array.isArray(p.visits) ||
                            !p.status
                        )
                            throw new Error();
                    }
                    data = parsed;
                    save();
                    importVisible = false;
                    render();
                    showToast('✅ Данные импортированы');
                } catch {
                    showToast('❌ Неверный формат JSON');
                }
            }

            function renderFooter() {
                let importBlock = importVisible
                    ? `
<div class="import-area">
  <textarea id="importTextarea" placeholder="Вставьте JSON сюда…" style="user-select:text;-webkit-user-select:text;"></textarea>
  <div class="row">
    <button class="primary" onclick="doImport()">Импортировать</button>
    <button class="secondary" onclick="toggleImport()">Отмена</button>
  </div>
</div>`
                    : '';

                return `
<div class="footer-help">
  <a href="#" onclick="openHelp();return false;"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:-2px;margin-right:4px;fill:currentColor;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>Инструкция</a>
  <span style="margin:0 8px;opacity:0.3;">·</span>
  <a href="https://t.me/shipachev" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:-2px;margin-right:4px;fill:currentColor;"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>@shipachev</a>
  <span style="margin:0 8px;opacity:0.3;">·</span>
  <span style="opacity:0.45;" id="appVersion"></span>
</div>
<div class="card" id="exportImportCard">
  <div style="font-size:15px;font-weight:600;margin-bottom:4px;">Резервная копия</div>
  <div class="small">Экспортируйте данные перед сменой браузера или устройства</div>
  <div class="footer-actions">
    <button onclick="exportData()">📤 Экспорт</button>
    <button onclick="toggleImport()">${importVisible ? '✕ Отмена' : '📥 Импорт'}</button>
  </div>
  ${importBlock}
</div>`;
            }

            function render() {
                archiveCheck();

                let p = activePass();

                let html = '<h1>🧗 ClimbPass</h1>';

                if (p) {
                    html += renderPassCard(p);
                } else {
                    html += renderCreate();
                }

                html += renderArchive();
                html += renderFooter();

                document.getElementById('app').innerHTML = html;

                // восстанавливаем версию после перерисовки
                if (APP_VERSION) {
                    const el = document.getElementById('appVersion');
                    if (el) el.textContent = 'v' + APP_VERSION;
                }
            }

            function editPass() {
                let p = activePass();

                if (!p) return;

                document.getElementById('app').innerHTML = `

<div class="card">

<h3>Редактировать абонемент</h3>

<div class="small">Дата начала</div>
<input id="editStart" type="date" value="${p.start}">

<div class="small">Дата окончания</div>
<input id="editEnd" type="date" value="${p.end}">

<div class="small">Количество посещений</div>
<select id="editTotal">
<option value="1" ${p.total === 1 ? 'selected' : ''}>1</option>
<option value="4" ${p.total === 4 ? 'selected' : ''}>4</option>
<option value="8" ${p.total === 8 ? 'selected' : ''}>8</option>
</select>

<div class="edit-buttons">

<button class="primary" onclick="saveEdit()">Сохранить</button>

<button class="secondary" onclick="render()">Отмена</button>

</div>

</div>

`;
            }

            function saveEdit() {
                let p = activePass();

                p.start = document.getElementById('editStart').value;
                p.end = document.getElementById('editEnd').value;
                p.total = parseInt(document.getElementById('editTotal').value);

                save();

                render();
            }

            function openHelp() {
                const html = `
<div class="help-overlay" onclick="closeHelp()">
    <div class="help-modal" onclick="event.stopPropagation()">

        <h3>Как установить приложение</h3>

        <div class="small">
        <b>iPhone</b><br>
        1. Откройте ссылку в Safari<br>
        2. Нажмите кнопку
        <span class="help-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 3l4 4h-3v7h-2V7H8l4-4zm-7 9h2v7h10v-7h2v9H5v-9z"/>
            </svg>
        </span>
        <b>Поделиться</b> внизу браузера.<br>
        3. Выберите <b>На экран «Домой»</b>.<br>
        4. Подтвердите добавление.

        <span class="help-icon">

                <circle cx="12" cy="12" r="2"></circle>
                <circle cx="12" cy="19" r="2"></circle>
            </svg>
        </span>.<br>
        3. Выберите <b>Установить приложение</b> или <b>Добавить на главный экран</b>.
        </div>

        <button class="primary help-close" onclick="closeHelp()">Понятно</button>

                document.body.insertAdjacentHTML('beforeend', html);
            }

            function closeHelp() {
                const el = document.querySelector('.help-overlay');
                if (el) el.remove();
            }

            render();
        </script>
        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then((reg) => {
                    // check for updates on load
                    reg.update();

                    // if a new service worker appears
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;

                        newWorker.addEventListener('statechange', () => {
                            if (
                                newWorker.state === 'installed' &&
                                navigator.serviceWorker.controller
                            ) {
                                // уведомляем пользователя и активируем новый SW
                                showToast('🆕 Обновление установлено…');
                                setTimeout(() => {
                                    newWorker.postMessage({
                                        type: 'SKIP_WAITING',
                                    });
                                }, 1200);
                            }
                        });
                    });
                });

                // reload page when the new service worker takes control
                navigator.serviceWorker.addEventListener(
                    'controllerchange',
                    () => {
                        window.location.reload();
                    },
                );
            }
        </script>
    </body>
</html>
