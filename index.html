<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />

        <title>ClimbPass</title>
        <link rel="manifest" href="manifest.json" />

        <meta name="theme-color" content="#ff6b2c" />

        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="ClimbPass" />

        <link rel="apple-touch-icon" href="icon-192.png" />
        <style>
            * {
                user-select: none; /* стандарт */
                -webkit-user-select: none; /* Safari / iOS */
                -moz-user-select: none; /* Firefox */
                -ms-user-select: none; /* IE/Edge */
            }

            :root {
                --bg: #f2f2f7;
                --card: #ffffff;
                --accent: #ff6b2c;
                --accent2: #ff9a6c;
                --text: #1c1c1e;
                --muted: #8e8e93;
                --border: #e5e5ea;
            }

            body {
                margin: 0;
                background: var(--bg);
                font-family:
                    -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
                color: var(--text);
                -webkit-touch-callout: none; /* убирает контекстное меню при долгом тапе на iOS */
            }

            .container {
                max-width: 520px;
                margin: auto;
                padding: 20px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 20px;
            }

            .card {
                background: white;
                border-radius: 22px;
                padding: 22px;
                margin-bottom: 18px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            }

            .small {
                font-size: 14px;
                color: var(--muted);
            }

            input,
            select {
                width: 100%;
                max-width: 100%;
                box-sizing: border-box;
                padding: 12px;
                border-radius: 12px;
                border: 1px solid var(--border);
                background: #f9f9f9;
                margin-bottom: 12px;
                font-size: 16px;
                display: block;
                text-align: left;
                text-align-last: left;
            }

            input[type='date'],
            input[type='number'],
            select {
                width: 100%;
                max-width: 100%;
                box-sizing: border-box;
                -webkit-appearance: none;
                appearance: none;
            }

            button {
                border: none;
                border-radius: 14px;
                padding: 14px;
                font-size: 16px;
                cursor: pointer;
            }

            .primary {
                background: var(--accent);
                color: white;
                width: 100%;
            }

            .secondary {
                background: #f2f2f7;
            }

            .visit {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 12px 0;
                border-bottom: 1px solid var(--border);
            }

            .delete {
                background: none;
                padding: 0;
            }

            .delete svg {
                width: 18px;
                height: 18px;
                fill: black;
            }

            .edit-buttons {
                display: flex;
                gap: 12px;
                margin-top: 14px;
            }

            .edit-buttons button {
                flex: 1;
            }

            .pass-card {
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                color: white;

                border-radius: 24px;

                padding: 24px;

                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);

                margin-bottom: 20px;
            }

            .pass-top {
                display: flex;
                justify-content: space-between;
            }

            .pass-title {
                font-size: 18px;
                font-weight: 600;
            }

            .pass-dates {
                font-size: 14px;
                opacity: 0.9;
            }

            .pass-visits {
                font-size: 48px;
                font-weight: 700;
                margin-top: 14px;
            }

            .pass-label {
                font-size: 14px;
                opacity: 0.9;
            }

            .progress-bar {
                margin-top: 16px;
                height: 10px;
                background: rgba(255, 255, 255, 0.25);
                border-radius: 8px;
                overflow: hidden;
            }

            .progress-fill {
                height: 100%;
                background: white;
                border-radius: 8px;
                transition: width 0.4s;
            }

            .pass-actions {
                margin-top: 18px;
            }

            .pass-edit {
                background: none;
                border: none;
                color: white;
            }

            .footer-help {
                text-align: center;
                margin-top: 30px;
                font-size: 14px;
                color: var(--muted);
            }

            .footer-help a {
                color: var(--accent);
                text-decoration: none;
                font-weight: 500;
            }

            .help-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                box-sizing: border-box;
                z-index: 1000;
            }

            .help-modal {
                background: white;
                border-radius: 18px;
                padding: 22px;
                max-width: 420px;
                width: 90%;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            }

            .help-modal h3 {
                margin-top: 0;
            }

            .help-close {
                margin-top: 16px;
                width: 100%;
            }

            .help-icon {
                display: inline-block;
                width: 18px;
                height: 18px;
                vertical-align: -3px;
                margin: 0 4px;
            }

            .help-icon svg {
                width: 100%;
                height: 100%;
                fill: currentColor;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div id="app"></div>
        </div>

        <script>
            let data = JSON.parse(localStorage.getItem('climb_pass') || '[]');

            function save() {
                localStorage.setItem('climb_pass', JSON.stringify(data));
            }

            function today() {
                return new Date().toISOString().split('T')[0];
            }

            function plus30() {
                let d = new Date();
                d.setDate(d.getDate() + 30);
                return d.toISOString().split('T')[0];
            }

            function formatDate(d) {
                return new Date(d).toLocaleDateString('ru-RU');
            }

            function daysLeft(end) {
                let diff = (new Date(end) - new Date()) / (1000 * 60 * 60 * 24);
                return Math.ceil(diff);
            }

            function activePass() {
                return data.find((p) => p.status === 'active');
            }

            function archiveCheck() {
                let p = activePass();

                if (!p) return;

                if (
                    new Date(p.end) < new Date() ||
                    p.visits.length >= p.total
                ) {
                    p.status = 'archived';
                    save();
                }
            }

            function createPass() {
                data.push({
                    id: Date.now(),
                    start: startInput.value,
                    end: endInput.value,
                    total: parseInt(totalInput.value),
                    visits: [],
                    status: 'active',
                });

                save();
                render();
            }

            function addVisit() {
                let p = activePass();

                if (!p) return;

                if (p.visits.length >= p.total) return;

                p.visits.push(today());

                save();

                render();
            }

            function deleteVisit(i) {
                let p = activePass();

                p.visits.splice(i, 1);

                save();

                render();
            }

            function renderCreate() {
                return `
<div class="card">

<h3>Новый абонемент</h3>

<div class="small">Дата начала</div>
<input id="startInput" type="date" value="${today()}">

<div class="small">Дата окончания</div>
<input id="endInput" type="date" value="${plus30()}">

<div class="small">Количество посещений</div>
<select id="totalInput">
<option value="1">1</option>
<option value="4">4</option>
<option value="8" selected>8</option>
</select>

<button class="primary" onclick="createPass()">Давай-давай-давай!</button>

</div>
`;
            }

            function renderPassCard(p) {
                let remain = p.total - p.visits.length;

                let percent = (p.visits.length / p.total) * 100;

                let visitsHTML = p.visits
                    .map(
                        (v, i) => `

<div class="visit">

<div>${formatDate(v)}</div>

<button class="delete" onclick="deleteVisit(${i})">

<svg viewBox="0 0 24 24">

<path d="M3 6h18v2H3V6zm2 3h14l-1.5 12.5H6.5L5 9z"/>

</svg>

</button>

</div>

`,
                    )
                    .join('');

                return `

<div class="pass-card">

<div class="pass-top">

<div>

<div class="pass-title">Абонемент</div>

<div class="pass-dates">${formatDate(p.start)} — ${formatDate(p.end)}</div>

<div class="pass-dates">${daysLeft(p.end)} дней осталось</div>

</div>

<button class="pass-edit" onclick="editPass()">

<svg viewBox="0 0 24 24" width="18" height="18">

<path fill="currentColor" d="M3 17.25V21h3.75l11-11.03-3.75-3.75L3 17.25z"/>

</svg>

</button>

</div>

<div class="pass-visits">${remain}</div>

<div class="pass-label">осталось посещений</div>

<div class="progress-bar">

<div class="progress-fill" style="width:${percent}%"></div>

</div>

<div class="pass-actions">

<button class="primary" onclick="addVisit()">Отметить посещение</button>

</div>

</div>

<div class="card">

<h3>История посещений</h3>

${visitsHTML || '<div class="small">Нет посещений</div>'}

</div>

`;
            }

            function renderArchive() {
                let archive = data.filter((x) => x.status === 'archived');

                let html = archive
                    .map(
                        (a) => `

<div class="visit">

<div>

${formatDate(a.start)} — ${formatDate(a.end)}

(${a.visits.length}/${a.total})

</div>

</div>

`,
                    )
                    .join('');

                return `

<div class="card">

<h3>Архив абонементов</h3>

${html || '<div class="small">Архив пуст</div>'}

</div>

`;
            }

            function render() {
                archiveCheck();

                let p = activePass();

                let html = '';

                if (p) {
                    html += renderPassCard(p);
                } else {
                    html += renderCreate();
                }

                html += renderArchive();

                html += `
<div class="footer-help">
<a href="#" onclick="openHelp();return false;">Инструкция</a>
</div>
`;

                document.getElementById('app').innerHTML = html;
            }

            function editPass() {
                let p = activePass();

                if (!p) return;

                document.getElementById('app').innerHTML = `

<div class="card">

<h3>Редактировать абонемент</h3>

<div class="small">Дата начала</div>
<input id="editStart" type="date" value="${p.start}">

<div class="small">Дата окончания</div>
<input id="editEnd" type="date" value="${p.end}">

<div class="small">Количество посещений</div>
<select id="editTotal">
<option value="1" ${p.total === 1 ? 'selected' : ''}>1</option>
<option value="4" ${p.total === 4 ? 'selected' : ''}>4</option>
<option value="8" ${p.total === 8 ? 'selected' : ''}>8</option>
</select>

<div class="edit-buttons">

<button class="primary" onclick="saveEdit()">Сохранить</button>

<button class="secondary" onclick="render()">Отмена</button>

</div>

</div>

`;
            }

            function saveEdit() {
                let p = activePass();

                p.start = editStart.value;
                p.end = editEnd.value;
                p.total = parseInt(editTotal.value);

                save();

                render();
            }

            function openHelp() {
                const html = `
<div class="help-overlay" onclick="closeHelp()">
    <div class="help-modal" onclick="event.stopPropagation()">

        <h3>Как установить приложение</h3>

        <div class="small">
        <b>iPhone</b><br>
        1. Откройте ссылку в Safari<br>
        2. Нажмите кнопку
        <span class="help-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 3l4 4h-3v7h-2V7H8l4-4zm-7 9h2v7h10v-7h2v9H5v-9z"/>
            </svg>
        </span>
        <b>Поделиться</b> внизу браузера.<br>
        3. Выберите <b>На экран «Домой»</b>.<br>
        4. Подтвердите добавление.
        <br><br>

        <b>Android</b><br>
        1. Откройте ссылку в Chrome<br>
        2. Нажмите меню браузера
        <span class="help-icon">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="5" r="2"></circle>
                <circle cx="12" cy="12" r="2"></circle>
                <circle cx="12" cy="19" r="2"></circle>
            </svg>
        </span>.<br>
        3. Выберите <b>Установить приложение</b> или <b>Добавить на главный экран</b>.
        </div>

        <button class="primary help-close" onclick="closeHelp()">Понятно</button>

    </div>
</div>
`;
                document.body.insertAdjacentHTML('beforeend', html);
            }

            function closeHelp() {
                const el = document.querySelector('.help-overlay');
                if (el) el.remove();
            }

            render();
        </script>
        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then((reg) => {
                    // check for updates on load
                    reg.update();

                    // if a new service worker appears
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;

                        newWorker.addEventListener('statechange', () => {
                            if (
                                newWorker.state === 'installed' &&
                                navigator.serviceWorker.controller
                            ) {
                                // tell new worker to activate immediately
                                newWorker.postMessage({ type: 'SKIP_WAITING' });
                            }
                        });
                    });
                });

                // reload page when the new service worker takes control
                navigator.serviceWorker.addEventListener(
                    'controllerchange',
                    () => {
                        window.location.reload();
                    },
                );
            }
        </script>
    </body>
</html>
